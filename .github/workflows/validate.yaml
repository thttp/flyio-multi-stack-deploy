name: Validate Submission

on:
  issues:
    types: [opened]

jobs:
  test-deployment:
    if: github.event.issue.title == '[Support Engineer] Submission ready'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suffix: [phoenix, node, python]
    steps:
      - name: Test ${{ matrix.suffix }} deployment
        id: test-url
        run: |
          REPO_NAME="${{ github.repository }}"
          REPO_NAME=$(echo "$REPO_NAME" | cut -d'/' -f2)
          URL="https://${REPO_NAME}-${{ matrix.suffix }}.fly.dev"
          echo "url=$URL" >> $GITHUB_OUTPUT

          echo "Testing deployment at: $URL"

          # Validate connection
          if ! curl --connect-timeout 10 -s -o /dev/null "$URL"; then
            echo "::error::Could not connect to $URL - Please verify your ${{ matrix.suffix }} app is deployed to Fly.io with the correct name"
            echo "Expected app name: ${REPO_NAME}-${{ matrix.suffix }}"
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ $HTTP_STATUS -ne 200 ]; then
            echo "::error::${{ matrix.suffix }} deployment check failed. Got HTTP status: $HTTP_STATUS from $URL"
            exit 1
          fi

          # Get debug header and HTML content
          DEBUG_HEADER=$(curl -s -I -H "flyio-debug: doit" "$URL" | grep "flyio-debug:")
          HTML_CONTENT=$(curl -s -H "flyio-debug: doit" "$URL")

          # Extract machine IDs
          DEBUG_MACHINE_ID=$(echo "$DEBUG_HEADER" | grep -o '"sid":"[^"]*"' | cut -d'"' -f4)
          HTML_MACHINE_ID=$(echo "$HTML_CONTENT" | grep -A1 'Machine ID' | grep -o '<dd.*</dd>' | sed 's/<[^>]*>//g' | xargs)

          # Validate machine ID match
          if [ -z "$DEBUG_MACHINE_ID" ] || [ -z "$HTML_MACHINE_ID" ]; then
            echo "::error::Could not extract machine ID from ${{ matrix.suffix }} app. Debug: '$DEBUG_MACHINE_ID', HTML: '$HTML_MACHINE_ID'"
            exit 1
          fi

          if [ "$DEBUG_MACHINE_ID" != "$HTML_MACHINE_ID" ]; then
            echo "::error::${{ matrix.suffix }} machine ID mismatch. Debug header: $DEBUG_MACHINE_ID, HTML content: $HTML_MACHINE_ID"
            exit 1
          fi

          echo "Deployment check successful for ${{ matrix.suffix }}"
          echo "Machine ID verified: $DEBUG_MACHINE_ID"

      - name: Create Summary
        run: |
          echo "## ${{ matrix.suffix }} Deployment" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.test-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
